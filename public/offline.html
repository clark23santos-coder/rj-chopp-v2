<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RJ Chopp offline</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #09090b;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        max-width: 420px;
        background: #18181b;
        border: 1px solid #27272a;
        border-radius: 28px;
        padding: 32px;
        text-align: center;
      }

      h1 {
        color: #facc15;
        font-size: 36px;
        margin: 0 0 12px;
      }

      p {
        color: #a1a1aa;
        line-height: 1.5;
      }

      .badge {
        display: inline-block;
        background: #facc15;
        color: #000;
        padding: 12px 18px;
        border-radius: 16px;
        font-weight: 900;
        margin-bottom: 20px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="badge">RJ Chopp SGE</div>

      <h1>Sem internet</h1>

      <p>
        O sistema abriu em modo offline. Conecte novamente à internet ou ao servidor local para carregar os dados.
      </p>
    </div>
  </body>
</html>
